name: mediproxy

services:
  postgres:
    image: postgres:14.20
    environment:
      POSTGRES_DB: shadowguard
      POSTGRES_USER: shadowguard
      POSTGRES_PASSWORD: shadowguard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadowguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # environment:
    #   DATABASE_URL: postgresql://shadowguard:shadowguard@postgres:5432/shadowguard
    #   TELEPHONY_ENABLED: ${TELEPHONY_ENABLED:-false}
    #   AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    #   AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    #   AWS_REGION: ${AWS_REGION:-us-east-1}
    #   CONNECT_INSTANCE_ID: ${CONNECT_INSTANCE_ID:-}
    #   CONNECT_CONTACT_FLOW_ID: ${CONNECT_CONTACT_FLOW_ID:-}
    #   CONNECT_SOURCE_PHONE: ${CONNECT_SOURCE_PHONE:-}
    #   ALERT_PHONE_NUMBER: ${ALERT_PHONE_NUMBER:-}
    #   CALL_COOLDOWN_SECONDS: ${CALL_COOLDOWN_SECONDS:-300}
    environment:
      DATABASE_URL: postgresql://shadowguard:shadowguard@postgres:5432/shadowguard
      TELEPHONY_ENABLED: ${TELEPHONY_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      ALERT_PHONE_NUMBER: ${ALERT_PHONE_NUMBER:-}
      CALL_COOLDOWN_SECONDS: ${CALL_COOLDOWN_SECONDS:-300}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      SERVICE_HOST: ${SERVICE_HOST:-}

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
